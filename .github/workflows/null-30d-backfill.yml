name: maemoji-null-30d-backfill

on:
  schedule:
    # GitHub Actions cron uses UTC. 23:20 UTC = 08:20 KST next day.
    - cron: "20 23 * * *"
  workflow_dispatch:
    inputs:
      recovery_limit:
        description: "Number of general null-30d stocks to recover"
        required: false
        default: "300"
      lookback_days:
        description: "Historical lookback days"
        required: false
        default: "120"

concurrency:
  group: maemoji-null-30d-backfill
  cancel-in-progress: false

jobs:
  run-null-30d-backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: DATABASE_URL
    env:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: ${{ secrets.DATABASE_URL }}
      SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
      SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      NULL_30D_LIMIT: ${{ github.event.inputs.recovery_limit || '300' }}
      NULL_30D_LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '120' }}
      MAEMOJI_BATCH_PRICE_SNAPSHOTS_DELAY_MILLIS: "1800"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant Gradle permission
        run: chmod +x ./gradlew
        working-directory: backend

      - name: Run null-30d recovery batch
        run: ./gradlew bootRun --args="--spring.main.web-application-type=none --maemoji.batch.run-once=price-null-30d --maemoji.batch.price-snapshots.null-30d-limit=${NULL_30D_LIMIT} --maemoji.batch.price-snapshots.null-30d-lookback-days=${NULL_30D_LOOKBACK_DAYS}"
        working-directory: backend
