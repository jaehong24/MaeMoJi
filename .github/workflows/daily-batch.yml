name: maeemoji-daily-batch

on:
  schedule:
    # GitHub Actions cron uses UTC. 21:47 UTC = 06:47 KST next day.
    - cron: "47 21 * * *"
  workflow_dispatch:
    inputs:
      price_limit:
        description: "Number of stocks to snapshot"
        required: false
        default: "500"

concurrency:
  group: maemoji-daily-batch
  cancel-in-progress: false

jobs:
  run-daily-batch:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: DATABASE_URL
    env:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: ${{ secrets.DATABASE_URL }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      PRICE_LIMIT: ${{ github.event.inputs.price_limit || '500' }}
      MAEMOJI_BATCH_PRICE_SNAPSHOTS_DELAY_MILLIS: "1200"
      SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
      SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
      

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant Gradle permission
        run: chmod +x ./gradlew
        working-directory: backend

      - name: Run daily integrated batch
        run: ./gradlew bootRun --args="--spring.main.web-application-type=none --maemoji.batch.run-once=daily --maemoji.batch.daily.price-limit=${PRICE_LIMIT}"
        working-directory: backend
