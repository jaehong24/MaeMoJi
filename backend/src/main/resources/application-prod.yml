server:
  port: ${PORT:8081}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:${MAEMOJI_DB_PORT:5432}/${MAEMOJI_DB_NAME:maemoji}}
    username: ${SPRING_DATASOURCE_USERNAME:${MAEMOJI_DB_USER:maemoji}}
    password: ${SPRING_DATASOURCE_PASSWORD:${MAEMOJI_DB_PASSWORD:maemoji1234}}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      validation-timeout: 5000
      initialization-fail-timeout: 10000
      max-lifetime: 600000
      keepalive-time: 240000
      idle-timeout: 300000
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.maemoji.backend
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.maemoji.backend: info
    com.maemoji.backend.user.mapper: warn
    com.maemoji.backend.portfolio.mapper: warn
    com.maemoji.backend.recommendation.mapper: warn

maemoji:
  batch:
    top-stocks:
      enabled: false
      cron: "0 0 6 * * *"
      delay-millis: 250
      target-count: 500
      exchange: US
    price-snapshots:
      # 운영 배치는 Render Cron Job이 담당합니다. 웹 서버에서는 중복 실행하지 않습니다.
      enabled: false
      cron: "0 40 6 * * *"
      delay-millis: 1200
      default-limit: 500
    daily:
      price-limit: 500
