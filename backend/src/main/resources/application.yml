server:
  port: ${PORT:8081}

  spring:
    datasource:
      url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:${MAEMOJI_DB_PORT:5432}/${MAEMOJI_DB_NAME:maemoji}}
      username: ${SPRING_DATASOURCE_USERNAME:${MAEMOJI_DB_USER:maemoji}}
      password: ${SPRING_DATASOURCE_PASSWORD:${MAEMOJI_DB_PASSWORD:maemoji1234}}
      driver-class-name: org.postgresql.Driver

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.maemoji.backend
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.maemoji.backend: debug

maemoji:
  batch:
    top-stocks:
      enabled: false
      cron: "0 0 6 * * *"
      delay-millis: 250
      target-count: 500
      exchange: US
    price-snapshots:
      enabled: true
      cron: "0 40 6 * * *"
      delay-millis: 250
      default-limit: 500
