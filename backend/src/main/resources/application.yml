server:
  port: ${PORT:8081}

spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
  application:
    name: maemoji-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:${MAEMOJI_DB_PORT:5432}/${MAEMOJI_DB_NAME:maemoji}}
    username: ${SPRING_DATASOURCE_USERNAME:${MAEMOJI_DB_USER:maemoji}}
    password: ${SPRING_DATASOURCE_PASSWORD:${MAEMOJI_DB_PASSWORD:maemoji1234}}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      validation-timeout: 5000
      initialization-fail-timeout: 10000
      max-lifetime: 600000
      keepalive-time: 240000
      idle-timeout: 300000
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}


mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.maemoji.backend
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.maemoji.backend: debug

maemoji:
  batch:
    stock-master:
      enabled: ${STOCK_MASTER_SYNC_ENABLED:false}
      cron: "${STOCK_MASTER_SYNC_CRON:0 0 4 * * *}"
      batch-size: ${STOCK_MASTER_SYNC_BATCH_SIZE:500}
    stock-asset-type:
      enabled: ${STOCK_ASSET_TYPE_BATCH_ENABLED:false}
      cron: "${STOCK_ASSET_TYPE_BATCH_CRON:0 20 4 * * *}"
    top-stocks:
      enabled: false
      cron: "0 0 6 * * *"
      delay-millis: 250
      target-count: 500
      exchange: US
    price-snapshots:
      # 운영 배치는 Render Cron Job이 담당합니다. 웹 서버에서는 중복 실행하지 않습니다.
      enabled: false
      cron: "0 40 6 * * *"
      # 무료 API 분당 한도를 넘지 않으면서 500종목을 약 10분 안에 처리합니다.
      delay-millis: 1200
      default-limit: 500
      history-lookback-days: 45
    daily:
      price-limit: 500
  recommendation:
    v4:
      factor-weights:
        price-momentum: 20
        price-stability: 12
        news-sentiment: 22
        fundamental-quality: 14
        valuation: 12
        quality-of-growth: 12
        user-fit: 8
      risk-profiles:
        safe-first:
          increase-threshold: 88
          maintain-threshold: 68
          reduce-threshold: 42
          user-adjustment: -5
          min-confidence-for-increase: 78
          min-strong-factor-count: 3
          strong-factor-score-threshold: 72
        balanced:
          increase-threshold: 76
          maintain-threshold: 58
          reduce-threshold: 35
          user-adjustment: 0
          min-confidence-for-increase: 72
          min-strong-factor-count: 3
          strong-factor-score-threshold: 68
        growth-seeker:
          increase-threshold: 72
          maintain-threshold: 54
          reduce-threshold: 32
          user-adjustment: 2
          min-confidence-for-increase: 68
          min-strong-factor-count: 2
          strong-factor-score-threshold: 65
        aggressive:
          increase-threshold: 68
          maintain-threshold: 50
          reduce-threshold: 28
          user-adjustment: 5
          min-confidence-for-increase: 65
          min-strong-factor-count: 2
          strong-factor-score-threshold: 62
      price-momentum:
        severe-drawdown-score: 18
        deep-pullback-score: 34
        pullback-score: 48
        soft-pullback-score: 62
        neutral-score: 74
        healthy-uptrend-score: 68
        warm-uptrend-score: 52
        overheated-score: 28
        euphoric-score: 10
        sharp-weekly-surge-penalty: 12
        weekly-surge-penalty: 8
        sharp-weekly-drop-penalty: 8
        weekly-drop-penalty: 4
        rebound-bonus: 5
        stable-trend-bonus: 2
        overheat-penalty: 16
      price-stability:
        stress5-score: 85
        stress10-score: 75
        stress20-score: 60
        stress30-score: 40
        fallback-score: 20
      increase-guard:
        absolute-valuation-block-max: 45
        expensive-quality-valuation-max: 55
        expensive-quality-fundamental-min: 78
        expensive-quality-growth-min: 75
        expensive-quality-momentum-max: 62
      conflict-rules:
        compounder-fundamental-min: 79
        compounder-growth-min: 70
        compounder-valuation-min: 73
        compounder-stability-min: 77
        compounder-momentum-min: 60
        compounder-bonus: 5
        expensive-elite-fundamental-min: 80
        expensive-elite-growth-min: 80
        expensive-elite-valuation-max: 45
        expensive-elite-penalty: -6
        expensive-good-fundamental-min: 78
