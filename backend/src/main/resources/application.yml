server:
  port: ${PORT:8081}

spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
  application:
    name: maemoji-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:${MAEMOJI_DB_PORT:5432}/${MAEMOJI_DB_NAME:maemoji}}
    username: ${SPRING_DATASOURCE_USERNAME:${MAEMOJI_DB_USER:maemoji}}
    password: ${SPRING_DATASOURCE_PASSWORD:${MAEMOJI_DB_PASSWORD:maemoji1234}}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      validation-timeout: 5000
      initialization-fail-timeout: 10000
      max-lifetime: 600000
      keepalive-time: 240000
      idle-timeout: 300000
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}


mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.maemoji.backend
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.maemoji.backend: debug

maemoji:
  batch:
    stock-master:
      enabled: ${STOCK_MASTER_SYNC_ENABLED:false}
      cron: "${STOCK_MASTER_SYNC_CRON:0 0 4 * * *}"
      batch-size: ${STOCK_MASTER_SYNC_BATCH_SIZE:500}
    top-stocks:
      enabled: false
      cron: "0 0 6 * * *"
      delay-millis: 250
      target-count: 500
      exchange: US
    price-snapshots:
      # 운영 배치는 Render Cron Job이 담당합니다. 웹 서버에서는 중복 실행하지 않습니다.
      enabled: false
      cron: "0 40 6 * * *"
      # 무료 API 분당 한도를 넘지 않으면서 500종목을 약 10분 안에 처리합니다.
      delay-millis: 1200
      default-limit: 500
    daily:
      price-limit: 500
  recommendation:
    v4:
      factor-weights:
        price-momentum: 25
        price-stability: 15
        news-sentiment: 25
        fundamental-quality: 20
        user-fit: 15
      risk-profiles:
        safe-first:
          increase-threshold: 90
          maintain-threshold: 68
          reduce-threshold: 42
          user-adjustment: -5
        balanced:
          increase-threshold: 85
          maintain-threshold: 60
          reduce-threshold: 35
          user-adjustment: 0
        growth-seeker:
          increase-threshold: 82
          maintain-threshold: 56
          reduce-threshold: 32
          user-adjustment: 2
        aggressive:
          increase-threshold: 78
          maintain-threshold: 52
          reduce-threshold: 28
          user-adjustment: 5
      price-stability:
        stress5-score: 85
        stress10-score: 75
        stress20-score: 60
        stress30-score: 40
        fallback-score: 20
      fundamental:
        base-score: 50
        market-cap:
          mega-cap-min: 500000
          mega-cap-adjustment: 20
          large-cap-min: 200000
          large-cap-adjustment: 16
          upper-mid-cap-min: 50000
          upper-mid-cap-adjustment: 10
          mid-cap-min: 10000
          mid-cap-adjustment: 4
          small-cap-adjustment: -4
        per:
          attractive-max: 20
          attractive-adjustment: 12
          fair-max: 35
          fair-adjustment: 6
          expensive-max: 60
          expensive-adjustment: 0
          very-expensive-adjustment: -10
          negative-or-unclear-adjustment: -8
        combination:
          positive-market-cap-min: 50000
          positive-per-max: 35
          positive-adjustment: 4
          negative-market-cap-max: 10000
          negative-per-min: 60
          negative-adjustment: -4
