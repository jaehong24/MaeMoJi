services:
  maemoji-postgres:
    image: postgres:16
    container_name: maemoji-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${MAEMOJI_DB_NAME:-maemoji}
      POSTGRES_USER: ${MAEMOJI_DB_USER:-maemoji}
      POSTGRES_PASSWORD: ${MAEMOJI_DB_PASSWORD:-maemoji1234}
    ports:
      - "${MAEMOJI_DB_PORT:-5432}:5432"
    volumes:
      - maemoji-postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MAEMOJI_DB_USER:-maemoji} -d ${MAEMOJI_DB_NAME:-maemoji}"]
      interval: 10s
      timeout: 5s
      retries: 10

  maemoji-adminer:
    image: adminer:4
    container_name: maemoji-adminer
    restart: unless-stopped
    depends_on:
      maemoji-postgres:
        condition: service_healthy
    ports:
      - "${MAEMOJI_ADMINER_PORT:-18080}:8080"

volumes:
  maemoji-postgres-data:
